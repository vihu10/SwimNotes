<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0e1726" />
    <title>SwimNotes · History</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("swimnotes.theme");
          if (!t)
            t = window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <a class="back-link" href="index.html">← Back</a>
        <span class="spacer"></span>
        <a class="logo" href="index.html"><span class="wave">≈</span> SwimNotes</a>
      </div>

      <h1>Meet History</h1>
      <p class="subtle">All meets saved on this device.</p>

      <div id="list"></div>

      <div id="danger-zone" style="display: none; margin-top: 32px">
        <button class="btn danger block" id="delete-all-btn">
          Delete all meets
        </button>
      </div>
    </div>

    <!-- Confirm clearing every meet (small centered modal) -->
    <dialog id="confirm-delete-all" class="confirm-dialog">
      <h2>Delete all meets?</h2>
      <p>
        This will permanently remove every saved meet and its notes from this
        device. This action cannot be undone.
      </p>
      <div class="dialog-actions confirm-actions">
        <button class="btn ghost" id="confirm-cancel">Cancel</button>
        <button class="btn danger" id="confirm-delete">Delete all</button>
      </div>
    </dialog>

    <script src="js/storage.js"></script>
    <script src="js/util.js"></script>
    <script src="js/chrome.js"></script>
    <script src="js/history.js"></script>
  </body>
</html>
